<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Recado 🌹</title>

<style>
body {
  margin: 0;
  background: radial-gradient(circle at top, #1a1a2e, #16213e, #000);
  overflow: hidden;
  font-family: 'Segoe UI', sans-serif;
  color: white;
  text-align: center;
}

/* botão */
button {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  padding: 15px 30px;
  font-size: 18px;
  border: none;
  border-radius: 30px;
  background: #ff4d6d;
  color: white;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  transform: translate(-50%, -50%) scale(1.1);
}

/* mensagem */
.mensagem {
  position: absolute;
  bottom: 40px;
  width: 100%;
  font-size: 28px;
  opacity: 0;
  transition: 2s;
}

canvas {
  display: none;
}
</style>
</head>

<body>

<button onclick="iniciar()">Abrir recado 💌</button>

<canvas width="900" height="550"></canvas>

<div class="mensagem" id="msg">
  Flavin cesar de conduru,<br>
  vc deixou vazar seu email
</div>

<script>
const canvas = document.querySelector("canvas");
const ctx = canvas.getContext("2d");

let flores = [];
let particulas = [];
let iniciado = false;

// cria flor "fechada"
function criarFlor(x, y) {
  return {
    x,
    y,
    abertura: 0, // 0 fechada → 1 aberta
    cor: ["#ff8fa3", "#c9184a"]
  };
}

// desenha pétala
function desenharPetala(flor, angulo) {
  ctx.save();
  ctx.translate(flor.x, flor.y);
  ctx.rotate(angulo);

  const grad = ctx.createRadialGradient(0, 0, 5, 0, 0, 20);
  grad.addColorStop(0, flor.cor[0]);
  grad.addColorStop(1, flor.cor[1]);

  ctx.fillStyle = grad;

  ctx.beginPath();
  ctx.ellipse(
    0,
    -20 * flor.abertura,
    10,
    20 * flor.abertura,
    0,
    0,
    Math.PI * 2
  );
  ctx.fill();

  ctx.restore();
}

// desenha flor completa
function desenharFlor(flor) {
  for (let i = 0; i < 8; i++) {
    desenharPetala(flor, (Math.PI * 2 / 8) * i);
  }

  // miolo
  ctx.fillStyle = "gold";
  ctx.beginPath();
  ctx.arc(flor.x, flor.y, 5, 0, Math.PI * 2);
  ctx.fill();

  // haste
  ctx.fillStyle = "#2ecc71";
  ctx.fillRect(flor.x - 2, flor.y, 4, 100);
}

// partículas
function criarParticula() {
  particulas.push({
    x: Math.random() * 900,
    y: 550,
    v: Math.random() * 2 + 1
  });
}

function desenharParticulas() {
  particulas.forEach(p => {
    ctx.fillStyle = "white";
    ctx.beginPath();
    ctx.arc(p.x, p.y, 2, 0, Math.PI * 2);
    ctx.fill();
    p.y -= p.v;
  });

  particulas = particulas.filter(p => p.y > 0);
}

// animação
function animar() {
  ctx.fillStyle = "rgba(0,0,0,0.2)";
  ctx.fillRect(0, 0, 900, 550);

  flores.forEach(f => {
    if (f.abertura < 1) f.abertura += 0.02; // desabrochar
    desenharFlor(f);
  });

  desenharParticulas();

  requestAnimationFrame(animar);
}

// iniciar experiência
function iniciar() {
  document.querySelector("button").style.display = "none";
  canvas.style.display = "block";

  // cria várias flores
  const pos = [
    [450,180],[350,220],[550,220],
    [300,260],[600,260],
    [400,300],[500,300],
    [250,320],[650,320]
  ];

  pos.forEach(p => flores.push(criarFlor(p[0], p[1])));

  setInterval(criarParticula, 200);
  animar();

  // mostra mensagem depois
  setTimeout(() => {
    document.getElementById("msg").style.opacity = 1;
  }, 2500);
}
</script>

</body>
</html>
